stages:
  - login
  - build

aws-login:
  stage: login
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  script:
    - mkdir -p .docker
    - |
      if [ -z "$AWS_DEFAULT_REGION" ] || [ -z "$DEV_REGISTRY" ]; then
        echo "Error: AWS_DEFAULT_REGION or DEV_REGISTRY is not set."
        exit 1
      fi
    - REGISTRY_HOST=$(echo -n "$DEV_REGISTRY" | cut -d/ -f1 | tr -d '\n')
    - PASSWORD=$(aws ecr get-login-password --region $AWS_DEFAULT_REGION)
    - AUTH=$(echo -n "AWS:$PASSWORD" | base64 | tr -d '\n')
    - echo "{\"auths\":{\"$REGISTRY_HOST\":{\"auth\":\"$AUTH\"}}}" > .docker/config.json
  artifacts:
    paths:
      - .docker/config.json
    expire_in: 1 hour
  tags:
    - mac

.template-build:
  stage: build
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox 
    BUILDKIT_EXTRA_OPTS: ""
    TARGET_DOCKER_FILE: Dockerfile
    SSL_CERT_DIR: /etc/ssl/certs
  before_script:
    - mkdir -p ~/.docker
    - cp .docker/config.json ~/.docker/config.json
  script:
    - test -n "${BUILD_CONTEXT_DIR}" || (echo "BUILD_CONTEXT_DIR is not set" && exit 1)
    - test -n "${TARGET_DOCKER_FILE}" || (echo "TARGET_DOCKER_FILE is not set" && exit 1)
    - export REGISTRY_CLEAN=$(echo -n "$DEV_REGISTRY" | tr -d '\n')
    - export TARGET_NAME_CLEAN=$(echo -n "$TARGET_IMAGE_NAME" | tr -d '\n')
    - export CLEAN_TAG=$(echo -n "$TARGET_IMAGE_TAG" | tr -d '\n')
    - |
      if [ -z "$REGISTRY_CLEAN" ]; then
        export IMAGE_NAME="${TARGET_NAME_CLEAN}:${CLEAN_TAG}"
        export CACHE_IMAGE="${TARGET_NAME_CLEAN}:cache"
      else
        export IMAGE_NAME="${REGISTRY_CLEAN}/${TARGET_NAME_CLEAN}:${CLEAN_TAG}"
        export CACHE_IMAGE="${REGISTRY_CLEAN}/${TARGET_NAME_CLEAN}:cache"
      fi
    - echo "Building ${BUILD_CONTEXT_DIR}/${TARGET_DOCKER_FILE} → $IMAGE_NAME"
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context="${CI_PROJECT_DIR}/${BUILD_CONTEXT_DIR}" \
        --local dockerfile="${CI_PROJECT_DIR}/${BUILD_CONTEXT_DIR}" \
        --opt filename="${TARGET_DOCKER_FILE}" \
        --export-cache type=registry,ref=$CACHE_IMAGE \
        --import-cache type=registry,ref=$CACHE_IMAGE \
        --opt platform=linux/amd64 \
        ${BUILDKIT_EXTRA_OPTS} \
        --output type=image,name=$IMAGE_NAME,push=true
  tags:
  - mac


build:backend:
  extends: .template-build
  variables:
    BUILD_CONTEXT_DIR: backend
    TARGET_IMAGE_NAME: "backend"
    TARGET_IMAGE_TAG: "latest"
  only:
    refs:
      - main


build:frontend:
  extends: .template-build
  variables:
    BUILD_CONTEXT_DIR: frontend
    TARGET_IMAGE_NAME: "frontend"
    TARGET_IMAGE_TAG: "latest"
  only:
    refs:
      - main
